<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1508 1260" role="img" aria-labelledby="vemus-map-title vemus-map-desc">
  <title id="vemus-map-title">Vemus 未音产品体验地图</title>
  <desc id="vemus-map-desc">Vemus 未音从沉浸式播放页建立创作期待，进入 AI 作歌与 AI 唱两类核心创作能力，再通过创作增强、作品沉淀和增长转化形成产品闭环。</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; }
      .eyebrow { fill: #86868b; font-size: 17px; font-weight: 760; letter-spacing: 4px; }
      .title { fill: #1d1d1f; font-size: 64px; font-weight: 780; letter-spacing: -1.5px; }
      .subtitle { fill: #6e6e73; font-size: 24px; font-weight: 600; }
      .section { fill: #86868b; font-size: 15px; font-weight: 760; letter-spacing: 3px; }
      .hero-title { fill: #ffffff; font-size: 38px; font-weight: 780; letter-spacing: -0.4px; }
      .hero-body { fill: #cfcfd4; font-size: 20px; font-weight: 560; }
      .h2 { fill: #1d1d1f; font-size: 36px; font-weight: 780; letter-spacing: -0.4px; }
      .h3 { fill: #1d1d1f; font-size: 28px; font-weight: 760; letter-spacing: -0.2px; }
      .body { fill: #6e6e73; font-size: 19px; font-weight: 560; }
      .chip { fill: #1d1d1f; font-size: 16px; font-weight: 670; }
      .chip-muted { fill: #6e6e73; font-size: 16px; font-weight: 650; }
      .card-label { font-size: 14px; font-weight: 780; letter-spacing: 2.8px; }
      .tiny { fill: #86868b; font-size: 13px; font-weight: 680; }
    </style>
    <filter id="softShadow" x="-8%" y="-12%" width="116%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#1d1d1f" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48e2bc"/>
      <stop offset="0.48" stop-color="#1d1d1f"/>
      <stop offset="1" stop-color="#f0a13a"/>
    </linearGradient>
    <linearGradient id="songSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#effbf7"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="singSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7e8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="1508" height="1260" fill="#f5f5f7"/>

  <text x="84" y="92" class="eyebrow">PRODUCT EXPERIENCE MAP</text>
  <text x="84" y="166" class="title">Vemus / 未音 APP</text>
  <text x="84" y="212" class="subtitle">AI Singing &amp; Songwriting App</text>
  <rect x="1130" y="104" width="294" height="52" rx="26" fill="#ffffff" stroke="#d2d2d7"/>
  <text x="1162" y="137" class="chip-muted">Listen first. Create next.</text>

  <g filter="url(#softShadow)">
    <rect x="84" y="268" width="1340" height="236" rx="42" fill="#1d1d1f"/>
    <text x="136" y="334" fill="#b5fff0" class="card-label">01 / ENTRY EXPERIENCE</text>
    <text x="136" y="390" class="hero-title">沉浸式播放页起播</text>
    <text x="136" y="432" class="hero-body">先让用户听到作品结果，再建立“我也想创作”的期待。</text>
    <text x="136" y="466" class="hero-body">入口不是表单，而是从听歌心智自然过渡到创作心智。</text>

    <g transform="translate(1098 302)">
      <rect x="0" y="0" width="132" height="160" rx="26" fill="#111113" stroke="#38383d"/>
      <rect x="14" y="18" width="104" height="124" rx="18" fill="url(#screenGrad)" opacity="0.86"/>
      <circle cx="66" cy="78" r="26" fill="#ffffff" opacity="0.16"/>
      <path d="M48 80L62 70V90Z" fill="#ffffff" opacity="0.88"/>
      <path d="M22 116C40 102 54 130 76 112C92 98 104 112 114 102" fill="none" stroke="#ffffff" stroke-opacity="0.72" stroke-width="3" stroke-linecap="round"/>
    </g>

    <g transform="translate(1170 342)">
      <path d="M0 42C34 8 78 8 112 42C146 76 190 76 224 42" fill="none" stroke="#4a4a4f" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="112" fill="#9b9ba0" class="mono" font-size="15" font-weight="700">listen -> imagine -> create</text>
    </g>
  </g>

  <g filter="url(#softShadow)">
    <rect x="84" y="560" width="1340" height="430" rx="42" fill="#ffffff" stroke="#e1e1e4"/>
    <text x="136" y="626" class="section">02 / CORE CREATION ENGINE</text>
    <text x="136" y="678" class="h2">两条创作路径，共用一套作品生成心智</text>
    <text x="136" y="716" class="body">用户可以从“写一首歌”或“唱一首歌”进入，最终都沉淀为可播放、可发布、可继续改编的作品资产。</text>

    <path d="M754 746V944" stroke="#d2d2d7" stroke-width="1.2"/>

    <g transform="translate(136 760)">
      <rect x="0" y="0" width="560" height="224" rx="28" fill="url(#songSoft)" stroke="#dceee8"/>
      <text x="32" y="38" fill="#007a5f" class="card-label">02A / SONGWRITING</text>
      <text x="32" y="78" class="h3">AI 作歌</text>
      <text x="202" y="78" class="body">从灵感到多版本歌曲。</text>
      <rect x="32" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="53" y="148" class="chip">对话作歌</text>
      <rect x="134" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="155" y="148" class="chip">灵感输入</text>
      <rect x="236" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="257" y="148" class="chip">歌词作歌</text>
      <rect x="338" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="359" y="148" class="chip">图片作歌</text>
      <rect x="440" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="461" y="148" class="chip">音乐配方</text>
      <rect x="32" y="172" width="114" height="34" rx="17" fill="#e9f8f2"/>
      <text x="53" y="194" fill="#007a5f" class="chip">多版本结果</text>
      <rect x="158" y="172" width="90" height="34" rx="17" fill="#e9f8f2"/>
      <text x="179" y="194" fill="#007a5f" class="chip">沉淀资产</text>
    </g>

    <g transform="translate(812 760)">
      <rect x="0" y="0" width="560" height="224" rx="28" fill="url(#singSoft)" stroke="#f0e2c8"/>
      <text x="32" y="38" fill="#a85a00" class="card-label">02B / SINGING</text>
      <text x="32" y="78" class="h3">AI 唱</text>
      <text x="160" y="78" class="body">从音色到完整演唱作品。</text>
      <rect x="32" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="53" y="148" class="chip">录制音色</text>
      <rect x="134" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="155" y="148" class="chip">选择音色</text>
      <rect x="236" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="257" y="148" class="chip">选择歌曲</text>
      <rect x="338" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="359" y="148" class="chip">试听效果</text>
      <rect x="440" y="126" width="90" height="34" rx="17" fill="#f5f5f7"/>
      <text x="461" y="148" class="chip">完整生成</text>
      <rect x="32" y="172" width="90" height="34" rx="17" fill="#fff0d2"/>
      <text x="53" y="194" fill="#a85a00" class="chip">沉淀资产</text>
    </g>
  </g>

  <text x="84" y="1062" class="section">03-05 / PRODUCT LOOP</text>

  <g filter="url(#softShadow)">
    <rect x="84" y="1094" width="420" height="122" rx="30" fill="#ffffff" stroke="#e1e1e4"/>
    <text x="124" y="1134" fill="#2b6df3" class="card-label">03 / EXTEND</text>
    <text x="124" y="1170" class="h3">创作增强</text>
    <text x="124" y="1198" class="body">制作同款 / AI 改编 / 模版作歌 / AIMV</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="544" y="1094" width="420" height="122" rx="30" fill="#ffffff" stroke="#e1e1e4"/>
    <text x="584" y="1134" class="card-label">04 / LIBRARY</text>
    <text x="584" y="1170" class="h3">作品沉淀</text>
    <text x="584" y="1198" class="body">我的作品 / 发行作品 / 歌单</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1004" y="1094" width="420" height="122" rx="30" fill="#ffffff" stroke="#e1e1e4"/>
    <text x="1044" y="1134" class="card-label">05 / GROWTH</text>
    <text x="1044" y="1170" class="h3">增长转化</text>
    <text x="1044" y="1198" class="body">金币购买 / 发行激励 / 付费全曲</text>
  </g>

  <path d="M504 1155H542" stroke="#c7c7cc" stroke-width="1.6"/>
  <path d="M964 1155H1002" stroke="#c7c7cc" stroke-width="1.6"/>
</svg>
